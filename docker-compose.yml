# 影律通 多服务编排
version: "3.8"

services:
  # Elasticsearch 8.x - BM25全文检索
  elasticsearch:
    image: elasticsearch:8.14.0
    container_name: cinemalaw-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinemalaw-net

  # Milvus 向量数据库
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: cinemalaw-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - cinemalaw-net

  minio:
    image: minio/minio:latest
    container_name: cinemalaw-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    ports:
      - "9001:9000"
    volumes:
      - minio_data:/minio_data
    networks:
      - cinemalaw-net

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: cinemalaw-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - cinemalaw-net

  # 影律通应用服务
  app:
    build: .
    container_name: cinemalaw-app
    environment:
      - APP_ENV=production
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      milvus:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./models:/models
    networks:
      - cinemalaw-net

volumes:
  es_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  cinemalaw-net:
    driver: bridge
